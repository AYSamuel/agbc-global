packages:
  - apps/*
  - packages/*

# pnpm blocks dependency lifecycle scripts by default (supply-chain posture, ~/.claude/standards/security.md).
# Only vetted packages that genuinely need a build script get allowed here.
allowBuilds:
  sharp: true
  # Explicit deny: prebuilt napi binaries ship as optional deps; the install script is a
  # fallback we don't need (create-next-app's own scaffold denies it too).
  unrs-resolver: false
