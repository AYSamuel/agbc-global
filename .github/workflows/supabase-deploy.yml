name: Supabase deploy

on:
  push:
    branches: [main]
    paths: ['supabase/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Merge to main auto-applies migrations to DEV only (docs/spec/21 §3).
  deploy-dev:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
      DEV_PROJECT_REF: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: latest
      - name: deploy migrations to dev
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$DEV_PROJECT_REF" ]; then
            echo "dev Supabase secrets not configured yet (see docs/runbooks/credentials.md); skipping"
            exit 0
          fi
          supabase link --project-ref "$DEV_PROJECT_REF"
          supabase db push
      # supabase functions deploy joins here when the first edge function lands (W1.3).

  # Prod applies ONLY via this manually dispatched job, using the `production`
  # environment's secrets (docs/spec/21 §3; the solo-dev approval gate per docs/spec/23 §4).
  # Double gate: Track P (docs/spec/25) must flip the PROD_DEPLOYS_ENABLED repo variable
  # before this job will run at all; the traffic fence and backup gates are absolute.
  deploy-prod:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
      PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
    steps:
      - name: track P gate
        if: vars.PROD_DEPLOYS_ENABLED != 'true'
        run: |
          echo "::error::Prod deploys are disabled until Track P gates pass (P1 backup+restore, P2 audit; docs/spec/25). Set repo variable PROD_DEPLOYS_ENABLED=true only after Ayo signs off."
          exit 1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: latest
      - name: deploy migrations to prod
        run: |
          supabase link --project-ref "$PROD_PROJECT_REF"
          supabase db push
